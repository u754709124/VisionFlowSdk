name: build-test

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: ./build/build.ps1

      - name: Test
        shell: pwsh
        run: ./build/test.ps1
